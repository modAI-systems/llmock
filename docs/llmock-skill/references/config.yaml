# llmock Configuration
# Each section is consumed by its respective router/component

# Port for the HTTP server (default: 8000)
port: 8000

# Debug mode - when true, pretty-prints all incoming request bodies to stdout
debug: false

# API key for authentication (optional - if not set, no auth required)
api-key:

# CORS configuration
cors:
  allow-origins:
    - "http://localhost:8000"

# Models configuration (used by models router)
models:
  - id: "gpt-4o"
    created: 1715367049
    owned_by: "openai"
  - id: "gpt-4o-mini"
    created: 1721172741
    owned_by: "openai"
  - id: "gpt-3.5-turbo"
    created: 1677610602
    owned_by: "openai"

# Ordered list of strategies (first non-empty result wins)
strategies:
  - ErrorStrategy
  - ToolCallStrategy
  - MirrorStrategy
