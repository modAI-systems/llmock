# llmock Configuration
# Each section is consumed by its respective router/component

# API key for authentication (optional - if not set, no auth required)
api-key: "your-secret-api-key"

# CORS configuration
cors:
  allow-origins:
    - "http://localhost:8000"

# Models configuration (used by models router)
models:
  - id: "gpt-4o"
    created: 1715367049
    owned_by: "openai"
  - id: "gpt-4o-mini"
    created: 1721172741
    owned_by: "openai"
  - id: "gpt-3.5-turbo"
    created: 1677610602
    owned_by: "openai"

# Ordered list of strategies to try. The first strategy that returns a
# non-empty result wins. At least one must be set.
#
# Available strategies:
#   MirrorStrategy    - echoes back the last user message
#   ToolCallStrategy  - triggered by trigger phrase in last user message
#   ErrorStrategy     - returns config-driven error responses
#
strategies:
  - ErrorStrategy
  - ToolCallStrategy
  - MirrorStrategy

# Error messages (optional)
# Maps message content to error responses. When a request's last user
# message matches one of these keys exactly, the server returns the
# configured error instead of a normal response. Works on both
# /chat/completions and /responses.
#
# Each entry needs: status-code, message, type, code
error-messages:
  "trigger-429":
    status-code: 429
    message: "Rate limit exceeded"
    type: "rate_limit_error"
    code: "rate_limit_exceeded"
  "trigger-500":
    status-code: 500
    message: "Internal server error"
    type: "server_error"
    code: "internal_error"
